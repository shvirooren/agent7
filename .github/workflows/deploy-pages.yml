name: Deploy Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - role-worker.js
      - wrangler.toml

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_PAGES_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 4d0d546524d1814d3e99474748c03be6
        run: |
          npm install -g wrangler
          wrangler pages deploy . --project-name=agent7 --commit-dirty=true
