<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent 7 — צ'אט</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      direction: rtl; height: 100dvh; display: flex; flex-direction: column;
      background: #fff;
    }

    /* ── Header ── */
    .hdr {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px;
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      flex-shrink: 0;
    }
    .hdr-badge {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, #0055A4, #00c8ff);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 900; color: #fff; flex-shrink: 0;
    }
    .hdr-info { flex: 1; min-width: 0; }
    .hdr-name { font-size: 15px; font-weight: 700; color: #003366; }
    .hdr-sub  { font-size: 12px; color: #64748b; margin-top: 1px; }
    .hdr-dot  { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; flex-shrink: 0; box-shadow: 0 0 6px #22c55e; }
    .back-btn {
      color: #94a3b8; font-size: 13px; background: none;
      border: none; cursor: pointer; font-family: inherit; transition: color .2s; flex-shrink: 0;
    }
    .back-btn:hover { color: #003366; }

    /* ── Messages ── */
    .msgs {
      flex: 1; overflow-y: auto; padding: 20px 16px;
      display: flex; flex-direction: column; gap: 14px;
      background: #f8fafc;
    }
    .msgs::-webkit-scrollbar { width: 4px; }
    .msgs::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

    .msg { display: flex; gap: 10px; max-width: 80%; animation: msgIn .25s ease; }
    @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.ai   { align-self: flex-start; }

    .av {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700;
    }
    .msg.ai   .av { background: linear-gradient(135deg, #0055A4, #00c8ff); color: #fff; }
    .msg.user .av { background: #e2e8f0; color: #64748b; border: 1px solid #cbd5e1; }

    .bubble {
      padding: 11px 15px; border-radius: 14px; font-size: 14px; line-height: 1.65;
      white-space: pre-wrap; word-break: break-word;
    }
    .msg.ai   .bubble { background: #fff; color: #1e293b; border: 1px solid #e2e8f0; border-radius: 2px 14px 14px 14px; }
    .msg.user .bubble { background: #0055A4; color: #fff; border-radius: 14px 2px 14px 14px; }
    .msg.typing .bubble { color: #94A3B8; font-style: italic; background: #fff; border: 1px solid #e2e8f0; }

    .placeholder {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #94a3b8; text-align: center; padding: 32px;
    }
    .placeholder-icon { font-size: 48px; margin-bottom: 16px; opacity: .5; }
    .placeholder-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
    .placeholder-sub   { font-size: 13px; line-height: 1.6; }

    /* ── Suggested questions ── */
    .suggestions { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 16px 12px; justify-content: flex-end; background: #f8fafc; }
    .sug {
      background: #fff; border: 1px solid #e2e8f0;
      color: #0055A4; font-size: 13px; padding: 7px 14px;
      border-radius: 100px; cursor: pointer; transition: all .2s; font-family: inherit;
    }
    .sug:hover { background: #eff6ff; border-color: #0055A4; }

    /* ── Input ── */
    .inp-wrap {
      padding: 12px 16px; background: #fff;
      border-top: 1px solid #e2e8f0; display: flex; gap: 10px; flex-shrink: 0;
    }
    .inp {
      flex: 1; padding: 11px 16px; border-radius: 12px;
      background: #f8fafc; border: 1.5px solid #e2e8f0;
      color: #1e293b; font-size: 14px; font-family: inherit;
      unicode-bidi: plaintext; text-align: start;
      outline: none; resize: none; min-height: 44px; max-height: 120px; overflow-y: auto;
      transition: border-color .2s;
    }
    .inp::placeholder { color: #94a3b8; }
    .inp:focus { border-color: #0055A4; background: #fff; }
    .send-btn {
      width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
      background: linear-gradient(135deg, #0055A4, #007acc);
      border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 18px; transition: all .2s; box-shadow: 0 2px 8px rgba(0,85,164,.4);
    }
    .send-btn:hover { transform: scale(1.05); }
    .send-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    /* ── Loading screen ── */
    .loading {
      position: fixed; inset: 0; z-index: 100;
      background: linear-gradient(135deg, #0a0f2e, #0d3572);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
    }
    .loading-logo { font-size: 40px; font-weight: 900; color: #fff; }
    .loading-logo span { color: #00c8ff; }
    .spinner {
      width: 36px; height: 36px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,.15); border-top-color: #00c8ff;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-msg { color: rgba(255,255,255,.5); font-size: 14px; }
  </style>
</head>
<body>

<div class="loading" id="loading">
  <div class="loading-logo">Agent <span>7</span></div>
  <div class="spinner"></div>
  <div class="loading-msg">טוען את הסוכן...</div>
</div>

<div class="hdr" id="hdr" style="display:none">
  <div class="hdr-badge">🤖</div>
  <div class="hdr-info">
    <div class="hdr-name" id="agent-name">סוכן AI</div>
    <div class="hdr-sub" id="agent-sub">מוכן לשאלות</div>
  </div>
  <div class="hdr-dot"></div>
  <button class="back-btn" onclick="goBack()">← שנה הגדרות</button>
</div>

<div class="msgs" id="msgs">
  <div class="placeholder" id="placeholder">
    <div class="placeholder-icon">💬</div>
    <div class="placeholder-title">הסוכן מוכן!</div>
    <div class="placeholder-sub">שאל כל שאלה הקשורה למידע שהעלית</div>
  </div>
</div>

<div class="suggestions" id="suggestions" style="display:none"></div>

<div class="inp-wrap">
  <textarea class="inp" id="inp" placeholder="כתוב שאלה..." rows="1" onkeydown="onKey(event)" oninput="autoResize(this)"></textarea>
  <button class="send-btn" id="send-btn" onclick="send()" disabled>➤</button>
</div>

<script>
var SURL = 'https://gmjfhjnwoymmxfqdazqf.supabase.co';
var SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdtamZoam53b3ltbXhmcWRhenFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MjksImV4cCI6MjA4ODI5MDYyOX0.oVQOSQU_4mWDyjecT0gLwenp2FiBK-pdhZ0RDbVvgXg';
var ROLE_WORKER_URL = 'https://agent7-rules.shvirooren.workers.dev';
var sb = supabase.createClient(SURL, SKEY);

var CU = null, role = null, chatHistory = [], currentCtrl = null;

function stopChat() {
  if (currentCtrl) { currentCtrl.abort(); currentCtrl = null; }
}
function setSending(on) {
  var btn = document.getElementById('send-btn');
  if (on) { btn.textContent = '■'; btn.onclick = stopChat; btn.style.background = '#ef4444'; btn.disabled = false; }
  else     { btn.textContent = '➤'; btn.onclick = send;     btn.style.background = ''; btn.disabled = false; }
}

(async function init() {
  try {
    var { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'start.html'; return; }
    CU = session.user;

    var roleId = sessionStorage.getItem('autoOpenRole');
    if (!roleId) { showLoadErr('לא נמצא סוכן — חזור להקמה'); return; }

    var { data, error } = await sb.from('job_roles').select('*').eq('id', roleId).single();
    if (error || !data) { showLoadErr('שגיאה בטעינת הסוכן: ' + (error?.message || 'לא נמצא')); return; }
    role = data;

    document.getElementById('agent-name').textContent = role.title || 'סוכן AI';
    document.getElementById('agent-sub').textContent  = role.description || 'מוכן לשאלות';
    var backUrl = sessionStorage.getItem('chatBackUrl') || '';
    var backLabel = backUrl.includes('dashboard') ? '← דשבורד' : backUrl.includes('employee') ? '← חזור' : '← שנה הגדרות';
    document.querySelector('.back-btn').textContent = backLabel;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('hdr').style.display = 'flex';
    document.getElementById('send-btn').disabled = false;
    document.getElementById('inp').focus();
    showSuggestions();
  } catch(e) {
    showLoadErr('שגיאה: ' + e.message);
  }
})();

function showLoadErr(msg) {
  document.querySelector('.loading-msg').textContent = msg;
  document.querySelector('.spinner').style.display = 'none';
  var btn = document.createElement('button');
  btn.textContent = '← חזור להקמה';
  btn.style.cssText = 'margin-top:16px;padding:10px 20px;border-radius:10px;background:#0055A4;color:#fff;border:none;cursor:pointer;font-size:14px;font-family:inherit';
  btn.onclick = function() { window.location.href = 'agent-setup.html'; };
  document.getElementById('loading').appendChild(btn);
}

function showSuggestions() {
  var sugs = document.getElementById('suggestions');
  var questions = ['ספר לי על עצמך', 'מה אתה יכול לעזור לי?', 'תן לי דוגמה'];
  sugs.innerHTML = questions.map(function(q) {
    return '<button class="sug" onclick="sendText(\'' + q.replace(/'/g,"\\'") + '\')">' + q + '</button>';
  }).join('');
  sugs.style.display = 'flex';
}

function hideSuggestions() {
  document.getElementById('suggestions').style.display = 'none';
}

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

async function sendText(text) {
  document.getElementById('inp').value = text;
  await send();
}

async function send() {
  var inp = document.getElementById('inp');
  var text = inp.value.trim();
  if (!text || !role) return;
  inp.value = ''; inp.style.height = 'auto';
  hideSuggestions();

  appendMsg(text, 'user');
  chatHistory.push({ role: 'user', content: text });

  var streamDiv = appendMsg('חושב...', 'ai typing');
  var bubble = streamDiv.querySelector('.bubble');
  var firstToken = true;
  currentCtrl = new AbortController();
  setSending(true);

  try {
    var timeout = setTimeout(function() { if (currentCtrl) currentCtrl.abort(); }, 30000);
    var r = await fetch(ROLE_WORKER_URL + '/role-chat', {
      method: 'POST',
      signal: currentCtrl.signal,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        role_profile: {
          id:               role.id,
          title:            role.title,
          description:      role.description || '',
          responsibilities: role.responsibilities || '',
          system_prompt:    role.system_prompt || ''
        },
        memory:               [],
        conversation_history: chatHistory.slice(-8),
        new_message:          text,
        today:                new Date().toLocaleDateString('he-IL'),
        permissions:          role.permissions || {},
        manager_id:           CU.id,
        stream:               true
      })
    });
    clearTimeout(timeout);

    var reader = r.body.getReader();
    var decoder = new TextDecoder();
    var buf = '';
    var fullReply = '';
    var msgsEl = document.getElementById('msgs');

    outer: while (true) {
      var chunk = await reader.read();
      if (chunk.done) break;
      buf += decoder.decode(chunk.value, { stream: true });
      var lines = buf.split('\n');
      buf = lines.pop() || '';
      for (var i = 0; i < lines.length; i++) {
        var line = lines[i];
        if (!line.startsWith('data: ')) continue;
        var raw = line.slice(6);
        if (raw === '[DONE]') break outer;
        var evt;
        try { evt = JSON.parse(raw); } catch(e) { continue; }
        if (evt.t) {
          if (firstToken) { streamDiv.className = 'msg ai'; bubble.textContent = ''; firstToken = false; }
          fullReply += evt.t;
          bubble.textContent = fullReply;
          msgsEl.scrollTop = msgsEl.scrollHeight;
        } else if (evt.action) {
          streamDiv.remove();
          firstToken = false;
          var msg = evt.reply || 'המסמך מוכן.';
          appendMsg(msg + ' 📄', 'ai');
          chatHistory.push({ role: 'assistant', content: msg });
          if (evt.action.type === 'create_pdf') generatePDF(evt.action.data);
          fullReply = msg;
          break outer;
        } else if (evt.error) {
          streamDiv.remove();
          appendMsg(evt.error, 'ai');
          fullReply = '';
          break outer;
        }
      }
    }

    if (fullReply) chatHistory.push({ role: 'assistant', content: fullReply });
    if (firstToken) { streamDiv.remove(); appendMsg('שגיאה בקבלת תשובה', 'ai'); }

  } catch(e) {
    streamDiv.remove();
    if (e.name !== 'AbortError') appendMsg('שגיאת חיבור: ' + e.message, 'ai');
  } finally {
    currentCtrl = null;
    setSending(false);
    document.getElementById('inp').focus();
  }
}

function generatePDF(data) {
  var sections = '';
  (data.sections || []).forEach(function(s) {
    if (s.heading) sections += '<h2>' + esc(s.heading) + '</h2>';
    if (s.type === 'text') {
      sections += '<p>' + esc(s.content || '').replace(/\n/g, '<br>') + '</p>';
    } else if (s.type === 'table' && s.headers) {
      sections += '<table><thead><tr>' + s.headers.map(function(h){ return '<th>' + esc(h) + '</th>'; }).join('') + '</tr></thead><tbody>';
      (s.rows || []).forEach(function(row){ sections += '<tr>' + row.map(function(c){ return '<td>' + esc(c) + '</td>'; }).join('') + '</tr>'; });
      sections += '</tbody></table>';
    } else if (s.type === 'list') {
      sections += '<ul>' + (s.items || []).map(function(i){ return '<li>' + esc(i) + '</li>'; }).join('') + '</ul>';
    }
  });
  var html = '<!DOCTYPE html><html dir="rtl" lang="he"><head><meta charset="UTF-8"><title>' + (data.title || 'מסמך') + '</title><style>'
    + 'body{font-family:Arial,sans-serif;direction:rtl;margin:40px;color:#1e293b}'
    + 'h1{color:#003366;font-size:22px;margin-bottom:4px}'
    + '.sub{color:#64748b;font-size:13px;margin-bottom:28px}'
    + 'h2{color:#0055A4;font-size:15px;margin-top:24px;border-bottom:1px solid #e2e8f0;padding-bottom:6px}'
    + 'p{line-height:1.7;font-size:13px}'
    + 'table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}'
    + 'th{background:#003366;color:#fff;padding:8px 12px;text-align:right}'
    + 'td{padding:7px 12px;border-bottom:1px solid #e2e8f0}'
    + 'tr:nth-child(even) td{background:#f8fafc}'
    + 'ul{margin:8px 0;padding-right:20px}'
    + 'li{font-size:13px;line-height:1.7}'
    + '</style></head><body>'
    + '<h1>' + esc(data.title || '') + '</h1>'
    + (data.subtitle ? '<div class="sub">' + esc(data.subtitle) + '</div>' : '')
    + sections + '</body></html>';
  var w = window.open('', '_blank');
  if (w) { w.document.write(html); w.document.close(); setTimeout(function(){ w.print(); }, 400); }
}

function appendMsg(text, cls) {
  var ph = document.getElementById('placeholder');
  if (ph) ph.remove();

  var msgs = document.getElementById('msgs');
  var isAi = cls.startsWith('ai');
  var d = document.createElement('div');
  d.className = 'msg ' + cls;
  var av = '<div class="av">' + (isAi ? '🤖' : '👤') + '</div>';
  var bub = '<div class="bubble">' + esc(text) + '</div>';
  d.innerHTML = isAi ? av + bub : bub + av;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
  return d;
}

function goBack() {
  var back = sessionStorage.getItem('chatBackUrl');
  if (!back && document.referrer) {
    var ref = document.referrer;
    if (ref.includes('dashboard')) back = 'dashboard.html';
    else if (ref.includes('employee')) back = 'employee.html';
    else if (ref.includes('agent-setup')) back = 'agent-setup.html';
  }
  sessionStorage.removeItem('autoOpenRole');
  sessionStorage.removeItem('chatBackUrl');
  window.location.href = back || 'dashboard.html';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
