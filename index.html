<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent 7 — מערכת משימות AI</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bd:#003366;--bm:#0055A4;--bl:#0077CC;--ba:#009FE3;--bp:#E8F4FC;--gl:#F5F7FA;--gm:#E2E8EF;--gt:#5A6A7A;--td:#1A2B3C;--gr:#16A34A;--gp:#DCFCE7;--rd:#DC2626;--rp:#FEE2E2;--or:#D97706;--op:#FEF3C7}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Heebo',sans-serif;background:#fff;color:var(--td);direction:rtl}
nav{background:#0A0F1E;border-bottom:1px solid #0D2545;padding:0 40px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-actions{display:flex;align-items:center;gap:10px}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.lic{width:34px;height:34px;background:linear-gradient(135deg,var(--bm),var(--ba));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff}
.ltx{font-size:17px;font-weight:800;color:#fff;letter-spacing:1px}
.ltx span{color:var(--ba)}
.nav-links{display:flex;align-items:center;gap:8px}
.nav-links a{color:var(--ba);text-decoration:none;font-size:14px;font-weight:500;padding:7px 16px;border-radius:4px;transition:all .15s}
.nav-links a:hover{color:#fff;background:rgba(0,119,204,.2)}
.btn-login{background:#fff;color:var(--bm);font-weight:700;border-radius:5px;border:1.5px solid #fff;padding:8px 20px;font-size:14px;text-decoration:none;transition:all .2s;cursor:pointer;font-family:'Heebo',sans-serif;display:inline-flex;align-items:center;justify-content:center;min-width:110px}
.btn-login:hover{background:var(--gm);color:var(--bd)}
.hero{background:linear-gradient(160deg,var(--bd) 0%,var(--bm) 60%,var(--bl) 100%);padding:80px 20px;text-align:center;color:#fff}
.hero-tag{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);padding:6px 16px;border-radius:100px;font-size:12px;font-weight:600;color:rgba(255,255,255,.9);margin-bottom:28px}
.hero-dot{width:6px;height:6px;background:var(--ba);border-radius:50%;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.hero h1{font-size:clamp(28px,5vw,46px);font-weight:900;line-height:1.1;margin-bottom:20px;letter-spacing:-1px}
.hero h1 em{font-style:normal;color:var(--ba)}
.hero p{font-size:17px;color:rgba(255,255,255,.8);max-width:520px;margin:0 auto 36px;line-height:1.7}
.hero-cta{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:56px}
.btn-primary{background:#fff;color:var(--bm);padding:13px 30px;border-radius:5px;font-size:15px;font-weight:700;text-decoration:none;transition:all .2s}
.btn-primary:hover{background:var(--bp);transform:translateY(-1px)}
.btn-secondary{background:#fff;color:var(--bm);padding:13px 30px;border-radius:5px;font-size:15px;font-weight:700;text-decoration:none;border:1.5px solid #fff;transition:all .2s}
.btn-secondary:hover{background:var(--bp);transform:translateY(-1px)}
.nav-pres{background:var(--bm)!important;color:#fff!important;font-weight:700!important;border-radius:5px!important;border:1px solid var(--ba)!important;padding:7px 16px!important;font-size:14px!important}
.nav-pres:hover{background:var(--bd)!important}
.hero-mockup{max-width:720px;margin:0 auto;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 40px 80px rgba(0,0,0,.3)}
.mockup-bar{background:var(--gl);padding:10px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--gm)}
.mockup-dots{display:flex;gap:5px}
.mockup-dot{width:10px;height:10px;border-radius:50%}
.d1{background:#FF5F57}.d2{background:#FFBD2E}.d3{background:#28CA42}
.mockup-url{font-size:11px;color:var(--gt);margin:0 auto;background:#fff;padding:3px 12px;border-radius:3px;border:1px solid var(--gm)}
.mockup-body{padding:16px}
.mockup-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.mockup-title{font-size:13px;font-weight:700;color:var(--td)}
.ai-badge{display:flex;align-items:center;gap:5px;background:var(--bp);padding:3px 10px;border-radius:100px;font-size:11px;color:var(--bm);font-weight:600;border:1px solid var(--gm)}
.task-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--gm);border-radius:5px;margin-bottom:7px}
.task-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.task-name{font-size:12px;font-weight:600;color:var(--td)}
.task-desc-m{font-size:11px;color:var(--gt)}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.s-open{background:var(--rd)}.s-progress{background:var(--or)}.s-done{background:var(--gr)}
.priority-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:2px}
.p-high{background:var(--rp);color:var(--rd)}.p-med{background:var(--op);color:var(--or)}.p-low{background:var(--gp);color:var(--gr)}
.stats{background:var(--gl);border-top:1px solid var(--gm);border-bottom:1px solid var(--gm)}
.stats-inner{max-width:900px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr)}
.stat{padding:32px;text-align:center;border-left:1px solid var(--gm)}
.stat:last-child{border-left:none}
.stat-num{font-size:42px;font-weight:900;color:var(--bm);display:block;margin-bottom:6px}
.stat-label{font-size:14px;color:var(--gt)}
.features{padding:80px 20px;max-width:1000px;margin:0 auto}
.section-tag{font-size:12px;font-weight:700;color:var(--bm);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
.section-title{font-size:clamp(26px,4vw,42px);font-weight:900;margin-bottom:48px;color:var(--bd)}
.features-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--gm);border:1px solid var(--gm);border-radius:8px;overflow:hidden}
.feature{background:#fff;padding:32px;transition:background .15s}
.feature:hover{background:var(--gl)}
.feature-icon{font-size:28px;margin-bottom:14px;display:block}
.feature h3{font-size:16px;font-weight:700;margin-bottom:8px;color:var(--td)}
.feature p{font-size:13.5px;color:var(--gt);line-height:1.7}
.how{background:var(--gl);border-top:1px solid var(--gm);border-bottom:1px solid var(--gm);padding:80px 20px}
.how-inner{max-width:900px;margin:0 auto}
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:32px;margin-top:48px}
.step{text-align:center}
.step-num{width:44px;height:44px;background:var(--bp);border:1.5px solid var(--bm);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:var(--bm);margin:0 auto 16px}
.step h3{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--td)}
.step p{font-size:13px;color:var(--gt);line-height:1.7}
.cta{padding:80px 20px;text-align:center;background:linear-gradient(160deg,var(--bd),var(--bm))}
.cta h2{font-size:clamp(28px,4vw,48px);font-weight:900;color:#fff;margin-bottom:16px}
.cta p{font-size:16px;color:rgba(255,255,255,.75);margin-bottom:36px}
.cta-buttons{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
footer{background:#0A0F1E;border-top:1px solid #0D2545;padding:24px 40px;display:flex;align-items:center;justify-content:space-between}
.footer-logo{font-size:13px;color:#fff;font-weight:600}
.footer-logo span{color:#fff}
.footer-links{display:flex;gap:20px}
.footer-links a{font-size:13px;color:var(--gt);text-decoration:none}
.footer-links a:hover{color:var(--bm)}
.btn-wa{background:#25D366;color:#fff;border-color:#25D366}
.btn-wa:hover{background:#1ebe5d;color:#fff}
.btn-demo{}
.btn-demo-hero{}
.btn-wa-hero{}
.btn-wa{background:#fff!important;color:var(--bm)!important;border-color:#fff!important}
.btn-wa:hover{background:var(--bp)!important;color:var(--bd)!important}
@media(max-width:768px){
  nav{padding:0 16px}
  .nav-actions{display:none}
  .nav-links a:not(.btn-login){display:none}
  .features-grid{grid-template-columns:1fr}
  .steps{grid-template-columns:1fr;gap:20px}
  .stats-inner{grid-template-columns:1fr}
  .stat{border-left:none;border-bottom:1px solid var(--gm)}
  footer{flex-direction:column;gap:12px;text-align:center}
  .hero{padding:60px 16px}
}
@media(max-width:480px){
  .stat{padding:20px 16px}
  .stat-num{font-size:32px}
  .hero-buttons .btn-primary,.hero-buttons .btn-outline{width:100%;justify-content:center}
}
</style>
</head>
<body>

<nav>
  <a href="#" class="logo">
    <div class="lic">A7</div>
    <div class="ltx">AGENT <span>7</span></div>
  </a>
  <div class="nav-actions">
    <a href="login.html" class="btn-login">כניסה למערכת</a>
    <a href="https://wa.me/972506323394" target="_blank" class="btn-login btn-wa">צור קשר</a>
  </div>
</nav>

<section class="hero">
  <div class="hero-tag"><div class="hero-dot"></div> סוכני AI שעובדים בשבילך</div>
  <h1>AGENT 7<br><em>הסוכן שמריץ לך את העסק</em></h1>
<div class="hero-cta">
    <a href="start.html" class="btn-primary">נסה את הדמו</a>
    <a href="login.html" class="btn-secondary">כניסה למערכת</a>
  </div>
  <img src="hero.png" alt="Agent 7" style="max-width:780px;width:100%;display:block;margin:0 auto;border-radius:14px;filter:drop-shadow(0 32px 60px rgba(0,0,0,.4))">
</section>




<footer>
  <div class="footer-logo">AGENT <span>7</span> © 2026</div>

</footer>


</body>
</html>
