<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent 7 - הגדרת סיסמה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Heebo',sans-serif;background:#F5F7FA;min-height:100vh;display:flex;align-items:center;justify-content:center;direction:rtl}
.bg{position:fixed;inset:0;background:linear-gradient(160deg,#003366 0%,#0055A4 60%,#0077CC 100%);z-index:0}
.bg-pattern{position:fixed;inset:0;z-index:0;opacity:.06;background-image:radial-gradient(circle,#fff 1px,transparent 1px);background-size:28px 28px}
.box{position:relative;z-index:1;background:#fff;border-radius:12px;padding:44px 40px;width:100%;max-width:400px;box-shadow:0 24px 64px rgba(0,0,0,.22)}
.logo{text-align:center;margin-bottom:10px}
.lic{width:42px;height:42px;background:linear-gradient(135deg,#0055A4,#009FE3);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff;margin:0 auto 10px}
.ltx{font-size:22px;font-weight:800;color:#003366;letter-spacing:1px}
.ltx span{color:#0077CC}
.tagline{text-align:center;font-size:13px;color:#5A6A7A;margin-bottom:32px}
.fg{margin-bottom:18px}
.fl{display:block;font-size:13px;font-weight:600;color:#1A2B3C;margin-bottom:6px}
.fi{width:100%;padding:10px 12px;border:1.5px solid #E2E8EF;border-radius:6px;font-size:14px;font-family:'Heebo',sans-serif;color:#1A2B3C;transition:border-color .2s,box-shadow .2s}
.fi:focus{outline:none;border-color:#0055A4;box-shadow:0 0 0 3px rgba(0,85,164,.1)}
.btn{width:100%;padding:13px;background:#0055A4;color:#fff;border:none;border-radius:6px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Heebo',sans-serif;transition:background .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:hover{background:#003366}
.btn:disabled{opacity:.6;cursor:not-allowed}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.btn.loading .spinner{display:block}
.btn.loading .btn-text{display:none}
.msg{padding:11px 14px;border-radius:5px;font-size:13px;margin-bottom:18px;display:none;border:1px solid}
.msg.err{background:#FEE2E2;color:#DC2626;border-color:#FCA5A5;display:block}
.msg.ok{background:#DCFCE7;color:#16A34A;border-color:#86EFAC;display:block}
.strength-bar{height:4px;border-radius:2px;background:#E2E8EF;margin-top:6px;overflow:hidden}
.strength-fill{height:100%;border-radius:2px;width:0;transition:width .3s,background .3s}
.strength-text{font-size:11px;color:#5A6A7A;margin-top:4px}
@media(max-width:480px){
  .box{padding:32px 20px;border-radius:0;min-height:100vh;display:flex;flex-direction:column;justify-content:center;box-shadow:none}
  body{align-items:flex-start}
}
</style>
</head>
<body>
<div class="bg"></div>
<div class="bg-pattern"></div>
<div class="box">
  <div class="logo">
    <div class="lic">A7</div>
    <div class="ltx">AGENT <span>7</span></div>
  </div>
  <div class="tagline">הגדרת סיסמה חדשה</div>

  <div id="msg" class="msg"></div>

  <div class="fg">
    <label class="fl">סיסמה חדשה</label>
    <input class="fi" id="pass" type="password" placeholder="לפחות 6 תווים" oninput="checkStrength(this.value)">
    <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
    <div class="strength-text" id="strength-text"></div>
  </div>
  <div class="fg">
    <label class="fl">אימות סיסמה</label>
    <input class="fi" id="pass2" type="password" placeholder="הכנס שוב">
  </div>
  <button class="btn" id="save-btn" onclick="setPassword()">
    <div class="spinner"></div>
    <span class="btn-text">שמור וכנס</span>
  </button>
</div>

<script>
var SURL = 'https://gmjfhjnwoymmxfqdazqf.supabase.co';
var SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdtamZoam53b3ltbXhmcWRhenFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MjksImV4cCI6MjA4ODI5MDYyOX0.oVQOSQU_4mWDyjecT0gLwenp2FiBK-pdhZ0RDbVvgXg';
var sb = supabase.createClient(SURL, SKEY);

// Password strength indicator
function checkStrength(val) {
  var fill = document.getElementById('strength-fill');
  var text = document.getElementById('strength-text');
  if (!val) { fill.style.width = '0'; text.textContent = ''; return; }
  var score = 0;
  if (val.length >= 6) score++;
  if (val.length >= 10) score++;
  if (/[A-Z]/.test(val) || /[0-9]/.test(val)) score++;
  if (/[^a-zA-Z0-9]/.test(val)) score++;
  var levels = [
    {w:'20%', bg:'#DC2626', label:'חלשה'},
    {w:'45%', bg:'#D97706', label:'בינונית'},
    {w:'70%', bg:'#0055A4', label:'טובה'},
    {w:'100%',bg:'#16A34A', label:'חזקה'}
  ];
  var l = levels[Math.min(score, 3)];
  fill.style.width = l.w;
  fill.style.background = l.bg;
  text.textContent = 'חוזק סיסמה: ' + l.label;
}

function showMsg(txt, type) {
  var el = document.getElementById('msg');
  el.textContent = txt;
  el.className = 'msg ' + (type || '');
}

// Route by role after successful password set
function routeByRole(uid) {
  sb.from('user_roles').select('role').eq('auth_user_id', uid).single().then(function(r) {
    var role = r.data ? r.data.role : null;
    if (role === 'manager') {
      window.location.href = 'dashboard.html';
    } else if (role === 'employee') {
      window.location.href = 'employee.html';
    } else {
      // no role yet — check employee_users
      sb.from('employee_users').select('employee_id').eq('auth_user_id', uid).single().then(function(er){
        window.location.href = er.data && er.data.employee_id ? 'employee.html' : 'login.html';
      });
    }
  });
}

function setPassword() {
  var pass  = document.getElementById('pass').value;
  var pass2 = document.getElementById('pass2').value;
  if (pass.length < 6) { showMsg('הסיסמה חייבת להיות לפחות 6 תווים', 'err'); return; }
  if (pass !== pass2)  { showMsg('הסיסמאות אינן תואמות', 'err'); return; }

  var btn = document.getElementById('save-btn');
  btn.disabled = true; btn.classList.add('loading');
  showMsg('', '');

  sb.auth.updateUser({ password: pass }).then(function(r) {
    btn.disabled = false; btn.classList.remove('loading');
    if (r.error) { showMsg('שגיאה: ' + r.error.message, 'err'); return; }

    var uid   = r.data.user.id;
    var email = r.data.user.email;

    // Link employee_users row (for newly invited employees)
    sb.from('employee_users')
      .update({ auth_user_id: uid })
      .eq('pending_email', email)
      .eq('auth_user_id', '00000000-0000-0000-0000-000000000000')
      .then(function() {
        // Upsert role as employee if not already set
        sb.from('user_roles').select('role').eq('auth_user_id', uid).single().then(function(roleR) {
          if (!roleR.data) {
            // No role — set as employee
            sb.from('user_roles').insert({ auth_user_id: uid, role: 'employee' }).then(function() {
              showMsg('✅ הסיסמה נשמרה! מעביר אותך...', 'ok');
              setTimeout(function() { routeByRole(uid); }, 1200);
            });
          } else {
            showMsg('✅ הסיסמה נשמרה! מעביר אותך...', 'ok');
            setTimeout(function() { routeByRole(uid); }, 1200);
          }
        });
      });
  });
}

// Verify session exists (from magic link / reset link / OTP)
// Supabase v2 משתמש ב-hash או ב-query params תלוי בהגדרות ה-project
var sessionVerified = false;

sb.auth.onAuthStateChange(function(event, session) {
  if (event === 'PASSWORD_RECOVERY' || event === 'SIGNED_IN') {
    sessionVerified = true;
    // Session קיים — נשאר בדף
  } else if (event === 'SIGNED_OUT' && sessionVerified) {
    // רק אם כבר היה session ועכשיו יצא — חזור ל-login
    window.location.href = 'login.html';
  }
});

// בדיקה ראשונית — תן ל-onAuthStateChange רגע לעבד hash/code fragments
setTimeout(function() {
  if (!sessionVerified) {
    sb.auth.getSession().then(function(r) {
      if (!r.data.session) {
        window.location.href = 'login.html';
      }
    });
  }
}, 500);

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') setPassword();
});
</script>
</body>
</html>
