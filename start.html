<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>התחל בחינם — Agent 7</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      direction: rtl; min-height: 100vh;
      background: linear-gradient(135deg, #0a0f2e 0%, #0d3572 50%, #0a1a4a 100%);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 24px 16px;
    }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 600px 400px at 20% 20%, rgba(0,200,255,.08) 0%, transparent 70%),
        radial-gradient(ellipse 400px 300px at 80% 70%, rgba(0,85,164,.15) 0%, transparent 70%);
    }

    .wrap { width: 100%; max-width: 440px; }

    .logo { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 36px; }
    .logo-badge {
      width: 40px; height: 40px; border-radius: 12px;
      background: linear-gradient(135deg, #0055A4, #00c8ff);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 900; color: #fff;
    }
    .logo-text { font-size: 22px; font-weight: 800; color: #fff; }
    .logo-text span { color: #00c8ff; }

    .hero { text-align: center; margin-bottom: 32px; }
    .hero-tag {
      display: inline-block; background: rgba(0,200,255,.12);
      border: 1px solid rgba(0,200,255,.3); color: #00c8ff;
      font-size: 12px; font-weight: 700; padding: 5px 14px;
      border-radius: 100px; margin-bottom: 14px;
    }
    .hero-title { font-size: 30px; font-weight: 900; color: #fff; line-height: 1.2; margin-bottom: 10px; }
    .hero-title span {
      background: linear-gradient(90deg, #00c8ff, #7dd3fc);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .hero-sub { font-size: 15px; color: rgba(255,255,255,.5); line-height: 1.6; }

    .card {
      background: rgba(255,255,255,.97); border-radius: 24px;
      box-shadow: 0 32px 80px rgba(0,0,0,.4), 0 0 0 1px rgba(255,255,255,.1);
      padding: 32px; animation: cardIn .4s ease;
    }
    @keyframes cardIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

    .card-title { font-size: 18px; font-weight: 800; color: #1e293b; margin-bottom: 4px; }
    .card-sub   { font-size: 13px; color: #94A3B8; margin-bottom: 24px; }

    .field { margin-bottom: 16px; }
    .lbl { display: block; font-size: 13px; font-weight: 700; color: #1e293b; margin-bottom: 6px; }
    .inp {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid #E2E8F0; border-radius: 10px;
      font-size: 15px; font-family: inherit; direction: rtl;
      color: #1e293b; background: #fff; transition: all .2s;
    }
    .inp:focus { outline: none; border-color: #009FE3; box-shadow: 0 0 0 3px rgba(0,159,227,.12); }

    .btn {
      width: 100%; padding: 14px; border-radius: 12px;
      font-size: 16px; font-weight: 700; cursor: pointer; border: none;
      font-family: inherit; margin-top: 8px; transition: all .2s;
      background: linear-gradient(135deg, #0055A4, #007acc);
      color: #fff; box-shadow: 0 4px 16px rgba(0,85,164,.35);
    }
    .btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,85,164,.45); }
    .btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    .err {
      background: #fee; border: 1px solid #fca5a5; border-radius: 10px;
      padding: 12px 14px; font-size: 13px; color: #dc2626;
      margin-bottom: 16px; display: none;
    }

    .footer { text-align: center; margin-top: 20px; font-size: 12px; color: rgba(255,255,255,.35); line-height: 1.7; }

    .steps-preview {
      display: flex; gap: 10px; margin-bottom: 28px;
    }
    .sp {
      flex: 1; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
      border-radius: 12px; padding: 14px 10px; text-align: center; color: rgba(255,255,255,.7);
    }
    .sp-icon { font-size: 22px; margin-bottom: 6px; }
    .sp-text { font-size: 12px; font-weight: 600; line-height: 1.4; }
    .sp-num { font-size: 10px; color: #00c8ff; font-weight: 700; margin-bottom: 4px; }
  </style>
</head>
<body>

<div class="wrap">

  <div class="logo">
    <div class="logo-badge">7</div>
    <div class="logo-text">Agent <span>7</span></div>
  </div>

  <div class="hero">
    <div class="hero-tag">⚡ הקמה בפחות מדקה — בחינם</div>
    <div class="hero-title">הקם סוכן AI<br><span>לעסק שלך עכשיו</span></div>
    <div class="hero-sub">העלה את הידע שלך, הסוכן לומד —<br>ומיד מוכן לענות על שאלות</div>
  </div>

  <div class="steps-preview">
    <div class="sp">
      <div class="sp-num">שלב 1</div>
      <div class="sp-icon">👤</div>
      <div class="sp-text">צור חשבון</div>
    </div>
    <div class="sp">
      <div class="sp-num">שלב 2</div>
      <div class="sp-icon">📂</div>
      <div class="sp-text">העלה מסמכים</div>
    </div>
    <div class="sp">
      <div class="sp-num">שלב 3</div>
      <div class="sp-icon">💬</div>
      <div class="sp-text">דבר עם הסוכן</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">יצירת חשבון חינמי</div>
    <div class="card-sub">פחות מ-30 שניות — ללא כרטיס אשראי</div>

    <div class="err" id="err"></div>

    <div class="field">
      <label class="lbl">שם מלא</label>
      <input class="inp" id="fullname" type="text" placeholder="ישראל ישראלי" autocomplete="name">
    </div>
    <div class="field">
      <label class="lbl">אימייל</label>
      <input class="inp" id="email" type="email" placeholder="you@company.com" autocomplete="email" dir="ltr">
    </div>
    <div class="field">
      <label class="lbl">סיסמה</label>
      <input class="inp" id="password" type="password" placeholder="לפחות 6 תווים" autocomplete="new-password">
    </div>

    <button class="btn" id="btn" onclick="register()">צור חשבון והתחל ←</button>
  </div>

  <div class="footer">
    כבר יש לך חשבון? <a href="login.html" style="color:#00c8ff;text-decoration:none">התחבר</a><br>
    בלחיצה על הכפתור אתה מסכים לתנאי השימוש
  </div>

</div>

<script>
var SURL = 'https://gmjfhjnwoymmxfqdazqf.supabase.co';
var SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdtamZoam53b3ltbXhmcWRhenFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MjksImV4cCI6MjA4ODI5MDYyOX0.oVQOSQU_4mWDyjecT0gLwenp2FiBK-pdhZ0RDbVvgXg';
var sb = supabase.createClient(SURL, SKEY);

// אם כבר מחובר — קפוץ ישר להקמה
(async function() {
  var { data: { session } } = await sb.auth.getSession();
  if (session) window.location.href = 'agent-setup.html';
})();

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') register();
});

async function register() {
  var name     = document.getElementById('fullname').value.trim();
  var email    = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;
  var btn      = document.getElementById('btn');
  var err      = document.getElementById('err');

  err.style.display = 'none';

  if (!name)            return showErr('יש להזין שם מלא');
  if (!email)           return showErr('יש להזין אימייל');
  if (password.length < 6) return showErr('הסיסמה חייבת להכיל לפחות 6 תווים');

  btn.disabled = true; btn.textContent = 'יוצר חשבון...';

  var { data, error } = await sb.auth.signUp({
    email,
    password,
    options: { data: { full_name: name } }
  });

  if (error) { showErr(error.message); btn.disabled = false; btn.textContent = 'צור חשבון והתחל ←'; return; }

  // הוסף ל-user_roles כמנהל
  if (data.user) {
    await sb.from('user_roles').upsert({ user_id: data.user.id, role: 'manager' }, { onConflict: 'user_id' });
  }

  window.location.href = 'agent-setup.html';
}

function showErr(msg) {
  var el = document.getElementById('err');
  el.textContent = msg; el.style.display = 'block';
}
</script>
</body>
</html>
