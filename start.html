<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent 7 — מתחיל...</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      direction: rtl; min-height: 100vh;
      background: linear-gradient(135deg, #0a0f2e 0%, #0d3572 50%, #0a1a4a 100%);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 24px 16px;
    }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 600px 400px at 20% 20%, rgba(0,200,255,.08) 0%, transparent 70%),
        radial-gradient(ellipse 400px 300px at 80% 70%, rgba(0,85,164,.15) 0%, transparent 70%);
    }
    .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; animation: fadeIn .5s ease; }
    .logo-badge {
      width: 48px; height: 48px; border-radius: 14px;
      background: linear-gradient(135deg, #0055A4, #00c8ff);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 900; color: #fff;
    }
    .logo-text { font-size: 26px; font-weight: 900; color: #fff; }
    .logo-text span { color: #00c8ff; }
    .msg { color: rgba(255,255,255,.6); font-size: 16px; animation: fadeIn .5s ease .2s both; }
    .spinner {
      width: 40px; height: 40px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,.15);
      border-top-color: #00c8ff;
      animation: spin .8s linear infinite;
      margin: 28px auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .err { color: #fca5a5; font-size: 14px; margin-top: 20px; display: none; }
  </style>
</head>
<body>

<div class="logo">
  <div class="logo-badge">7</div>
  <div class="logo-text">Agent <span>7</span></div>
</div>
<div class="msg">מכין את הסביבה שלך...</div>
<div class="spinner"></div>
<div class="err" id="err"></div>

<script>
var SURL = 'https://gmjfhjnwoymmxfqdazqf.supabase.co';
var SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdtamZoam53b3ltbXhmcWRhenFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MjksImV4cCI6MjA4ODI5MDYyOX0.oVQOSQU_4mWDyjecT0gLwenp2FiBK-pdhZ0RDbVvgXg';
var sb = supabase.createClient(SURL, SKEY);

(async function() {
  try {
    // אם כבר יש session — קפוץ ישר
    var { data: { session } } = await sb.auth.getSession();
    if (session) { window.location.href = 'agent-setup.html'; return; }

    // כניסה אנונימית — ללא שם/סיסמה
    var { data, error } = await sb.auth.signInAnonymously();
    if (error) throw new Error(error.message);

    // הוסף כמנהל
    if (data.user) {
      await sb.from('user_roles').upsert(
        { user_id: data.user.id, role: 'manager' },
        { onConflict: 'user_id' }
      );
    }

    window.location.href = 'agent-setup.html';
  } catch(e) {
    document.querySelector('.spinner').style.display = 'none';
    var err = document.getElementById('err');
    err.textContent = 'שגיאה: ' + e.message;
    err.style.display = 'block';
  }
})();
</script>
</body>
</html>
